[[session]]
name = "Downloads"
path = "~/Downloads"
startup_command = "yazi"

[[session]]
name = "repositories (c)"
path = "~/c"
startup_command = "l"

# [[session]]
# name = "home (~)"
# path = "~"
# disable_startup_command = true
# startup_command = "l"
[[wildcard]]
pattern = "~/c/re/**"
startup_command = "echo 'Raycast is cool'"

# configs

