#
# Smart session manager for the terminal
# https://github.com/joshmedeski/sesh

strict_mode = false
cache = false
separator_aware = true
dir_length = 2
# git_namer_use_worktree_root = true
# git_dir_length = 2

import = [
  # "~/.config/sesh/configs/nu-sesh.toml",
  # "~/.config/sesh/configs/raycast-extensions.toml",
  "~/.config/sesh/configs/windows.toml",
]

[tui]
show_icons = true
prompt = "ūüĆ≤"
placeholder = "Pick a seshhhhh"


# sort_order = ["tmux", "config", "tmuxinator", "zoxide"]
# sort_order = ["tmux", "config", "tmuxinator", "zoxide"]
# blacklist_sources = ["tmux", "zoxide"]


# projects
# project_roots = ["~/c"]
# max_depth = 2
# sort_order = ["tmux", "projects"]

# [marker]
# inactivity_threshold = 10    # Seconds before alerts start
# alert_level_1_time = 60      # Light alert duration
# alert_level_2_time = 300     # Medium alert duration
# alert_level_3_time = 600     # Urgent alert duration

blacklist = ["^scratch$", "^_", '^~/\.config(?:/.*)?$']


# wezterm_wallpapers_dir = "/Users/joshmedeski/.config/wezterm/wallpapers"

# nutilti

[[session]]
name = "nutiliti"
path = "~/c/nu"

[[session]]
name = "nu cleanup worktrees"
path = "~/c/nu"
startup_command = "nu_cleanup_worktrees"


# default

[default_session]
startup_command = "nvim"
preview_command = "eza --all --git --icons --color=always {}"
# startup_command_ignore_dirs = ["~/repos", "~/.config"]

[[session]]
name = "exit immediately"
path = "~"
startup_command = "exit"

[[session]]
name = "home"
path = "~"
windows = ["obsidian"]

[[window]]
name = "obsidian"
startup_script = "nvim"
path = "~/c/second-brain"

# common

[[session]]
name = "start conversation"
path = "$HOME/c/second-brain/"
startup_command = "claude (gum input --placeholder 'What do you want to do?' | string escape)"

[[session]]
name = "pick code"
path = "~/c"
startup_command = "pick-code.sh"

[[session]]
name = "discordo"
path = "~/.config/discordo"
startup_command = "discordo"

[[session]]
name = "update"
path = "/tmp"
startup_command = "update"
preview_command = "bat --language=fish --style=snip --color=always ~/c/dotfiles/.config/bin/update"

[[session]]
name = "claude code config"
path = "~/.claude"

[[session]]
name = "pick wallpaper"
path = "~/.config/wezterm/wallpapers"
startup_command = "tmux set-option status off && wezterm_wallpaper_picker.sh && exit"

# [[session]]
# name = "stormy"
# path = "~/.config/stormy"
# preview_command = "stormy"
# startup_command = "stormy"

[[session]]
name = "plugins"
path = "~"
startup_command = "~/.config/bin/plugin_picker.sh && exit"

[[session]]
name = "godot projects"
path = "~/c/godot/"
startup_command = "sesh connect \"$(ls | fzf)\" && exit"
preview_command = "lsd  --group-dirs first -A"

[[session]]
name = "fastfetch"
path = "~/.config/fastfetch"
startup_command = "fastfetch"
preview_command = "fastfetch"

